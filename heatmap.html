<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Heart Disease Risk Heatmap</title>
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: Arial, sans-serif;
      padding: 20px 24px;
      background: #f9f7f5;
    }
    .controls {
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    label {
      font-weight: bold;
      font-size: 13px;
    }
    select {
      padding: 5px 10px;
      font-size: 13px;
      border-radius: 6px;
      border: 1px solid #ddd;
      background: white;
      cursor: pointer;
    }
    .tooltip {
      position: fixed;
      background: rgba(0,0,0,0.82);
      color: white;
      border-radius: 6px;
      padding: 8px 12px;
      font-size: 12px;
      line-height: 1.6;
      pointer-events: none;
      opacity: 0;
      z-index: 999;
    }
    .axis-label {
      font-size: 12px;
      font-weight: bold;
    }
    .cell-label {
      text-anchor: middle;
      dominant-baseline: middle;
      pointer-events: none;
    }
    .legend-title {
      font-size: 12px;
      font-weight: bold;
    }
    .legend-label {
      font-size: 11px;
    }
    svg {
      width: 100%;
      height: auto;
      display: block;
    }
  </style>
</head>
<body>

  <div class="controls">
    <label for="ageFilter">Age Group:</label>
    <select id="ageFilter">
      <option value="All">All</option>
      <option value="<50">&lt;50</option>
      <option value="50-60">50–60</option>
      <option value="60+">60+</option>
    </select>
  </div>

  <svg id="heatmap-svg" viewBox="0 0 760 420" preserveAspectRatio="xMidYMid meet"></svg>
  <div class="tooltip" id="tooltip"></div>

<script>
  const svg    = d3.select("#heatmap-svg");
  const margin = { top: 30, right: 130, bottom: 90, left: 110 };
  const width  = 760 - margin.left - margin.right;
  const height = 420 - margin.top  - margin.bottom;

  const g = svg.append("g")
    .attr("transform", `translate(${margin.left},${margin.top})`);

  const tooltip = document.getElementById("tooltip");

  d3.csv("heatmap_data.csv", d => ({
    sex:             d.sex,
    chest_pain_type: d.chest_pain_type,
    age_group:       d.age_group,
    total:           +d.total,
    disease_rate:    +d.disease_rate
  })).then(data => {

    const xCategories = [...new Set(data.map(d => d.chest_pain_type))];
    const yCategories = [...new Set(data.map(d => d.sex))];

    const x = d3.scaleBand().domain(xCategories).range([0, width]).padding(0.06);
    const y = d3.scaleBand().domain(yCategories).range([0, height]).padding(0.06);
    const color = d3.scaleSequential().domain([0, 1]).interpolator(d3.interpolateReds);

    // X axis
    g.append("g")
      .attr("transform", `translate(0,${height})`)
      .call(d3.axisBottom(x))
      .selectAll("text")
      .attr("transform", "rotate(-20)")
      .style("text-anchor", "end")
      .style("font-size", "11px");

    // Y axis
    g.append("g")
      .call(d3.axisLeft(y))
      .selectAll("text")
      .style("font-size", "11px");

    // X axis label
    svg.append("text")
      .attr("class", "axis-label")
      .attr("x", margin.left + width / 2)
      .attr("y", height + margin.top + 78)
      .attr("text-anchor", "middle")
      .text("Chest Pain Type");

    // Y axis label
    svg.append("text")
      .attr("class", "axis-label")
      .attr("transform", "rotate(-90)")
      .attr("x", -(margin.top + height / 2))
      .attr("y", 18)
      .attr("text-anchor", "middle")
      .text("Sex");

    // Legend
    const legendX = margin.left + width + 30;
    const legendY = margin.top + 20;
    const legendH = 160;
    const legendW = 14;

    const defs = svg.append("defs");
    const grad = defs.append("linearGradient")
      .attr("id", "heatmap-gradient")
      .attr("x1", "0%").attr("y1", "100%")
      .attr("x2", "0%").attr("y2", "0%");

    d3.range(0, 1.01, 0.1).forEach(d => {
      grad.append("stop")
        .attr("offset", `${d * 100}%`)
        .attr("stop-color", color(d));
    });

    svg.append("text")
      .attr("class", "legend-title")
      .attr("x", legendX)
      .attr("y", legendY - 10)
      .text("Disease Rate");

    svg.append("rect")
      .attr("x", legendX).attr("y", legendY)
      .attr("width", legendW).attr("height", legendH)
      .style("fill", "url(#heatmap-gradient)")
      .style("stroke", "#ccc");

    const legendScale = d3.scaleLinear().domain([0, 1]).range([legendH, 0]);
    svg.append("g")
      .attr("transform", `translate(${legendX + legendW},${legendY})`)
      .attr("class", "legend-label")
      .call(
        d3.axisRight(legendScale)
          .tickValues([0, 0.25, 0.5, 0.75, 1])
          .tickFormat(d3.format(".0%"))
      );

    // Update function
    function updateChart(selectedAge) {
      let filtered;

      if (selectedAge === "All") {
        filtered = Array.from(
          d3.rollup(
            data,
            v => {
              const total = d3.sum(v, d => d.total);
              const rate  = d3.sum(v, d => d.disease_rate * d.total) / total;
              return {
                sex:             v[0].sex,
                chest_pain_type: v[0].chest_pain_type,
                total:           total,
                disease_rate:    rate
              };
            },
            d => d.sex,
            d => d.chest_pain_type
          ),
          ([, inner]) => Array.from(inner, ([, vals]) => vals)
        ).flat();
      } else {
        filtered = data.filter(d => d.age_group === selectedAge);
      }

      // Cells
      g.selectAll("rect.heat-cell")
        .data(filtered, d => d.sex + "-" + d.chest_pain_type)
        .join(
          enter => enter.append("rect")
            .attr("class", "heat-cell")
            .attr("x",      d => x(d.chest_pain_type))
            .attr("y",      d => y(d.sex))
            .attr("width",  x.bandwidth())
            .attr("height", y.bandwidth())
            .attr("rx", 4)
            .attr("fill",         d => color(d.disease_rate))
            .attr("stroke",       "white")
            .attr("stroke-width", 2)
            .style("cursor", "pointer")
            .on("mouseover", function(event, d) {
              tooltip.style.opacity = 1;
              tooltip.innerHTML =
                `<strong>Sex:</strong> ${d.sex}<br/>
                 <strong>Chest Pain:</strong> ${d.chest_pain_type}<br/>
                 <strong>Disease Rate:</strong> ${(d.disease_rate * 100).toFixed(1)}%<br/>
                 <strong>Count:</strong> ${d.total}`;
            })
            .on("mousemove", function(event) {
              tooltip.style.left = (event.clientX + 14) + "px";
              tooltip.style.top  = (event.clientY - 30) + "px";
            })
            .on("mouseout", function() {
              tooltip.style.opacity = 0;
            })
            .on("click", function() {
              g.selectAll("rect.heat-cell")
                .attr("stroke",       "white")
                .attr("stroke-width", 2);
              d3.select(this)
                .attr("stroke",       "#333")
                .attr("stroke-width", 3);
            }),
          update => update
            .attr("x",    d => x(d.chest_pain_type))
            .attr("y",    d => y(d.sex))
            .attr("fill", d => color(d.disease_rate)),
          exit => exit.remove()
        );

      // Cell labels
      g.selectAll("text.cell-label").remove();
      g.selectAll("text.cell-label")
        .data(filtered, d => d.sex + "-" + d.chest_pain_type)
        .enter()
        .append("text")
        .attr("class", "cell-label")
        .attr("x",  d => x(d.chest_pain_type) + x.bandwidth() / 2)
        .attr("y",  d => y(d.sex) + y.bandwidth() / 2)
        .attr("dy", "0.35em")
        .style("fill",        d => d.disease_rate > 0.45 ? "#fff" : "#333")
        .style("font-size",   "13px")
        .style("font-weight", "700")
        .text(d => `${(d.disease_rate * 100).toFixed(0)}%`);
    }

    updateChart("All");

    d3.select("#ageFilter").on("change", function() {
      updateChart(this.value);
    });

  }).catch(err => {
    document.body.innerHTML += `<p style="color:red; margin-top:20px;">
      Error loading heatmap_data.csv: ${err.message}
    </p>`;
  });
</script>
</body>
</html>
